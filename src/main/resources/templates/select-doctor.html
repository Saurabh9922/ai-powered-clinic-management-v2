<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Doctor – Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .doctor-card { border: 2px solid #e9ecef; border-radius: 14px; transition: all .2s; }
        .doctor-card:hover { border-color: #1a73e8; box-shadow: 0 8px 24px rgba(26,115,232,.15); transform: translateY(-4px); }
        .badge-spec { font-size: 0.78rem; padding: 5px 12px; border-radius: 20px; }
        .step-badge { background: #1a73e8; color: white; border-radius: 50%; width: 28px; height: 28px; display:inline-flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; }
    </style>
</head>
<body>
<div class="container py-5">

    <div class="mb-3">
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>

    <!-- Step indicator -->
    <div class="d-flex align-items-center gap-2 mb-4">
        <span class="step-badge">1</span>
        <span class="fw-semibold text-primary">Select Doctor</span>
        <span class="text-muted mx-1">→</span>
        <span class="text-muted">2. Pick Slot</span>
        <span class="text-muted mx-1">→</span>
        <span class="text-muted">3. Confirm</span>
    </div>

    <h4 class="fw-bold mb-4">
        <i class="bi bi-people text-primary me-2"></i>Choose a Doctor
    </h4>

    <div th:if="${doctors.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>No doctors available. Please contact the admin.
    </div>

    <div class="row g-3">
        <div class="col-md-4 col-sm-6" th:each="doc : ${doctors}">
            <div class="doctor-card p-3">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div style="width:50px;height:50px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-person-fill text-primary fs-4"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0" th:text="${doc.name}">Doctor</h6>
                        <span class="badge bg-primary bg-opacity-10 text-primary badge-spec"
                              th:text="${doc.specialization}"></span>
                    </div>
                </div>
                <a th:href="@{/slots/{id}(id=${doc.id})}"
                   class="btn btn-primary btn-sm w-100 fw-semibold">
                    <i class="bi bi-calendar2-check me-1"></i>View Slots
                </a>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result – Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .disease-banner { background: linear-gradient(135deg, #6f42c1, #4a2c8a); border-radius: 16px; }
        .doctor-card { border: 2px solid #e9ecef; border-radius: 12px; transition: all .2s; }
        .doctor-card:hover { border-color: #28a745; box-shadow: 0 6px 20px rgba(40,167,69,.15); transform: translateY(-3px); }
        .badge-spec { font-size: 0.78rem; padding: 6px 14px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="mb-3">
                <a th:href="@{/predict}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Try Again
                </a>
                <a th:href="@{/dashboard}" class="btn btn-outline-primary btn-sm ms-2">
                    <i class="bi bi-house me-1"></i>Dashboard
                </a>
            </div>

            <!-- Disease Result Banner -->
            <div class="disease-banner text-white text-center p-4 mb-4">
                <i class="bi bi-activity fs-1 mb-2 d-block"></i>
                <h2 class="fw-bold mb-1">Predicted Disease</h2>
                <h1 class="display-5 fw-bold" th:text="${disease}">Unknown</h1>
                <p class="opacity-75 mb-0">
                    Recommended Specialist:
                    <strong th:text="${specialization}">General</strong>
                </p>
            </div>

            <!-- Symptoms Selected -->
            <div class="card mb-4 p-3">
                <p class="fw-semibold mb-2 text-muted"><i class="bi bi-check2-all me-2"></i>Symptoms you selected:</p>
                <div class="d-flex flex-wrap gap-2">
                    <span th:each="s : ${selectedSymptoms}"
                          class="badge bg-purple bg-opacity-10 text-dark border"
                          style="font-size:.82rem; padding:6px 12px; border-radius:20px;"
                          th:text="${#strings.replace(s,'_',' ')}">
                    </span>
                </div>
            </div>

            <!-- Recommended Doctors -->
            <h5 class="fw-bold mb-3">
                <i class="bi bi-person-badge text-success me-2"></i>Recommended Doctors
            </h5>

            <div th:if="${doctors.isEmpty()}" class="alert alert-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>
                No doctors found for <strong th:text="${specialization}"></strong> specialization.
                Please ask the admin to add one.
            </div>

            <div class="row g-3" th:unless="${doctors.isEmpty()}">
                <div class="col-md-6" th:each="doc : ${doctors}">
                    <div class="doctor-card p-3 d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="fw-bold mb-1">
                                <i class="bi bi-person-circle text-primary me-2"></i>
                                <span th:text="${doc.name}"></span>
                            </h6>
                            <span class="badge bg-primary bg-opacity-10 text-primary badge-spec"
                                  th:text="${doc.specialization}"></span>
                        </div>
                        <a th:href="@{/slots/{id}(id=${doc.id})}"
                           class="btn btn-success btn-sm fw-semibold">
                            <i class="bi bi-calendar-check me-1"></i>Book
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

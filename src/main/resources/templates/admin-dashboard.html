<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        .stat-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .action-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: transform .2s, box-shadow .2s; text-decoration: none; color: inherit; }
        .action-card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); color: inherit; }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin: 0 auto 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">
        <i class="bi bi-shield-fill me-2"></i>Admin Panel
    </span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white opacity-75">
            <i class="bi bi-person-badge me-1"></i>
            <span th:text="${username}">Admin</span>
        </span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
</nav>

<div class="container py-5">

    <div class="text-center mb-5">
        <h2 class="fw-bold text-dark">Admin Dashboard</h2>
        <p class="text-muted">Manage doctors and clinic settings</p>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-5 justify-content-center">
        <div class="col-md-5">
            <div class="stat-card card p-4 text-center">
                <i class="bi bi-person-badge fs-1 text-danger mb-2"></i>
                <h2 class="fw-bold text-danger" th:text="${totalDoctors}">0</h2>
                <p class="text-muted mb-0">Total Doctors</p>
            </div>
        </div>
        <!--
        <div class="col-md-4">
            <div class="stat-card card p-4 text-center">
                <i class="bi bi-hospital fs-1 text-primary mb-2"></i>
                <h2 class="fw-bold text-primary">1</h2>
                <p class="text-muted mb-0">Active Clinic</p>
            </div>
        </div>
        -->
        <div class="col-md-4">
            <div class="stat-card card p-4 text-center">
                <i class="bi bi-clock-history fs-1 text-success mb-2"></i>
                <h2 class="fw-bold text-success">24/7</h2>
                <p class="text-muted mb-0">Portal Uptime</p>
            </div>
        </div>
    </div>

    <!-- Action Cards -->
    <div class="row g-4 justify-content-center">
        <div class="col-md-5">
            <a th:href="@{/admin/add-doctor}" class="action-card card p-4 text-center d-block">
                <div class="icon-circle bg-success bg-opacity-10">
                    <i class="bi bi-person-plus text-success"></i>
                </div>
                <h5 class="fw-bold">Add New Doctor</h5>
                <p class="text-muted small mb-0">Register a new doctor and generate their time slots automatically.</p>
            </a>
        </div>
        <div class="col-md-5">
            <a th:href="@{/admin/doctors}" class="action-card card p-4 text-center d-block">
                <div class="icon-circle bg-primary bg-opacity-10">
                    <i class="bi bi-people text-primary"></i>
                </div>
                <h5 class="fw-bold">View All Doctors</h5>
                <p class="text-muted small mb-0">See all registered doctors and manage or remove them.</p>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Disease – Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header { background: linear-gradient(135deg, #6f42c1, #4a2c8a); border-radius: 16px 16px 0 0 !important; }
        .symptom-item { border: 2px solid #e9ecef; border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all .2s; }
        .symptom-item:hover { border-color: #6f42c1; background: #f3f0ff; }
        .symptom-item input:checked + label { color: #6f42c1; font-weight: 600; }
        .symptom-item:has(input:checked) { border-color: #6f42c1; background: #f3f0ff; }
        .btn-purple { background: linear-gradient(135deg, #6f42c1, #4a2c8a); border: none; color: white; }
        .btn-purple:hover { background: linear-gradient(135deg, #5a35a0, #3a2070); color: white; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="mb-3">
                <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                </a>
            </div>

            <div class="card">
                <div class="card-header text-white text-center py-4">
                    <i class="bi bi-activity fs-1"></i>
                    <h3 class="mt-2 mb-0 fw-bold">Disease Prediction</h3>
                    <p class="mb-0 opacity-75">Select your symptoms to get a prediction</p>
                </div>

                <div class="card-body p-4">

                    <div th:if="${param.noSymptom}" class="alert alert-warning mb-4">
                        <i class="bi bi-exclamation-triangle me-2"></i>Please select at least one symptom.
                    </div>

                    <form th:action="@{/predict}" method="post">
                        <p class="text-muted mb-3 fw-semibold">
                            <i class="bi bi-check2-square me-2 text-purple"></i>
                            Check all symptoms you are experiencing:
                        </p>

                        <div class="row g-2 mb-4">
                            <div class="col-md-4 col-sm-6" th:each="symptom : ${symptoms}">
                                <div class="symptom-item d-flex align-items-center gap-2">
                                    <input type="checkbox"
                                           class="form-check-input mt-0"
                                           name="symptoms"
                                           th:value="${symptom}"
                                           th:id="${symptom}">
                                    <label th:for="${symptom}"
                                           class="form-check-label w-100 text-capitalize"
                                           style="cursor:pointer;"
                                           th:text="${#strings.replace(symptom,'_',' ')}">
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-purple btn-lg fw-semibold flex-fill">
                                <i class="bi bi-search me-2"></i>Predict Disease
                            </button>
                            <button type="reset" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
